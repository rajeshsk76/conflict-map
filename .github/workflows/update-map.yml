name: Update EntropyMap AI

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-map:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run AI map generator
        run: python update_conflict_map_ai.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html conflict_map.html incidents_latest.json incidents_latest.csv archive/*.json
          git diff --cached --quiet || git commit -m "Auto-update EntropyMap AI"
          git push
